services:
  narralytica-db:
    image: pgvector/pgvector:pg16
    container_name: narralytica-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-narralytica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-narralytica}
    ports:
      - "5433:5432"
    volumes:
      - ./docker-volumes/pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-narralytica}"]
      interval: 5s
      timeout: 5s
      retries: 5

  narralytica-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: narralytica-backend
    restart: unless-stopped
    depends_on:
      narralytica-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-narralytica}:${POSTGRES_PASSWORD:-changeme_in_production}@narralytica-db:5432/${POSTGRES_DB:-narralytica}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SONARR_URL: http://host.docker.internal:8989
      SONARR_API_KEY: ${SONARR_API_KEY:-}
      RADARR_URL: http://host.docker.internal:7878
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      PLEX_PROCESSING_URL: ${PLEX_PROCESSING_URL:-http://100.108.190.10:8006}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8005:8005"
    volumes:
      - ./backend:/app
      - ./docker-volumes/media:/app/media

  narralytica-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: narralytica-worker
    restart: unless-stopped
    depends_on:
      narralytica-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-narralytica}:${POSTGRES_PASSWORD:-changeme_in_production}@narralytica-db:5432/${POSTGRES_DB:-narralytica}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    command: python -m celery -A app.worker worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./docker-volumes/media:/app/media

  narralytica-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: narralytica-frontend
    restart: unless-stopped
    depends_on:
      - narralytica-backend
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:8005}
    ports:
      - "3020:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
